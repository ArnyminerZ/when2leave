<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>when2leave</title>
  <link rel="icon" type="image/png" href="/static/logo.png" />
  <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-BBDmZzVt6vjz5YbUqWbjFPoBRoiVYLdxZKVKm3iUwzr/RXlQXzP3lqrn+VeqIB4H" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1115; --fg: #e6e8eb; --muted: #9aa3ad; --card: #171a21;
      --border: #2a2f3a; --accent: #5aa9ff; --ok: #4caf82; --warn: #e0a72e; --bad: #e05a5a;
    }
    @media (prefers-color-scheme: light) {
      :root { --bg: #f5f6f8; --fg: #14161a; --muted: #5b6472; --card: #ffffff; --border: #dfe3e8; }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 2rem; background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 1100px; margin-inline: auto;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    h2 { font-size: 1.05rem; margin: 2rem 0 0.75rem; color: var(--muted); font-weight: 600; }
    .status-bar {
      display: flex; flex-wrap: wrap; gap: 1rem; padding: 0.9rem 1.1rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.85rem; color: var(--muted);
    }
    .status-bar b { color: var(--fg); }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .dot.ok { background: var(--ok); } .dot.bad { background: var(--bad); } .dot.unknown { background: var(--muted); }
    table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    th, td { text-align: left; padding: 0.6rem 0.8rem; font-size: 0.88rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    tr:last-child td { border-bottom: none; }
    tr.event-row { cursor: pointer; }
    tr.event-row:hover { background: color-mix(in srgb, var(--accent) 8%, transparent); }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; }
    .badge.none { background: color-mix(in srgb, var(--muted) 25%, transparent); color: var(--muted); }
    .badge.heads_up_sent { background: color-mix(in srgb, var(--warn) 25%, transparent); color: var(--warn); }
    .badge.leave_now_sent { background: color-mix(in srgb, var(--accent) 25%, transparent); color: var(--accent); }
    .badge.running_late_sent { background: color-mix(in srgb, var(--bad) 25%, transparent); color: var(--bad); }
    .badge.done, .badge.cancelled, .badge.dropped { background: color-mix(in srgb, var(--muted) 20%, transparent); color: var(--muted); }
    .empty { padding: 1rem; color: var(--muted); font-style: italic; font-size: 0.88rem; }
    .history-row td { background: color-mix(in srgb, var(--fg) 3%, var(--card)); }
    a { color: var(--accent); }
    .map-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    #map { height: 320px; background: var(--border); }
    .map-meta { padding: 0.6rem 1.1rem; font-size: 0.85rem; color: var(--muted); border-top: 1px solid var(--border); }
    .map-meta b { color: var(--fg); }
  </style>
</head>
<body>
  <h1>when2leave</h1>
  <p style="color: var(--muted); margin-top: 0;">Real-time travel-time tracking for your calendar.</p>

  <h2 style="margin-top: 0;">Current location</h2>
  <div class="map-card">
    <div id="map"></div>
    <div class="map-meta">
      Position as of <b id="location-time">{{ status.current_location.timestamp.strftime('%Y-%m-%d %H:%M:%S UTC') if status.current_location else 'no data yet' }}</b>
      <span id="location-age"></span>
    </div>
  </div>

  <div id="sections" hx-get="/partials/sections" hx-trigger="every 15s" hx-swap="innerHTML">
    {% include "_sections.html" %}
  </div>

  <script>
    (function () {
      {% if status.current_location %}
      const initialLat = {{ status.current_location.lat }};
      const initialLon = {{ status.current_location.lon }};
      const initialTs = "{{ status.current_location.timestamp.isoformat() }}";
      {% else %}
      const initialLat = null;
      const initialLon = null;
      const initialTs = null;
      {% endif %}

      const map = L.map('map');
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }).addTo(map);

      let marker = null;
      let lastTimestamp = initialTs;

      function setPosition(lat, lon) {
        const latlng = [lat, lon];
        if (marker === null) {
          marker = L.marker(latlng).addTo(map);
          map.setView(latlng, 15);
        } else {
          marker.setLatLng(latlng);
        }
      }

      if (initialLat !== null && initialLon !== null) {
        setPosition(initialLat, initialLon);
      } else {
        map.setView([0, 0], 2);
      }

      function updateAgeLabel() {
        const label = document.getElementById('location-age');
        if (!lastTimestamp) { label.textContent = ''; return; }
        const ageS = Math.max(0, Math.floor((Date.now() - new Date(lastTimestamp).getTime()) / 1000));
        label.textContent = '(' + ageS + 's ago)';
      }

      function refreshLocation() {
        fetch('/api/location', { headers: { 'Accept': 'application/json' } })
          .then((r) => r.json())
          .then((data) => {
            if (data.lat === null || data.lon === null) return;
            setPosition(data.lat, data.lon);
            lastTimestamp = data.timestamp;
            document.getElementById('location-time').textContent =
              new Date(data.timestamp).toUTCString().replace('GMT', 'UTC');
            updateAgeLabel();
          })
          .catch(() => {});
      }

      updateAgeLabel();
      setInterval(updateAgeLabel, 1000);
      setInterval(refreshLocation, 15000);
    })();
  </script>
</body>
</html>
