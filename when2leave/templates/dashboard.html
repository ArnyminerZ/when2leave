<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>when2leave</title>
  <link rel="icon" type="image/png" href="/static/logo.png" />
  <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-BBDmZzVt6vjz5YbUqWbjFPoBRoiVYLdxZKVKm3iUwzr/RXlQXzP3lqrn+VeqIB4H" crossorigin="anonymous"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f1115; --fg: #e6e8eb; --muted: #9aa3ad; --card: #171a21;
      --border: #2a2f3a; --accent: #5aa9ff; --ok: #4caf82; --warn: #e0a72e; --bad: #e05a5a;
    }
    @media (prefers-color-scheme: light) {
      :root { --bg: #f5f6f8; --fg: #14161a; --muted: #5b6472; --card: #ffffff; --border: #dfe3e8; }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 2rem; background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 1100px; margin-inline: auto;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    h2 { font-size: 1.05rem; margin: 2rem 0 0.75rem; color: var(--muted); font-weight: 600; }
    .status-bar {
      display: flex; flex-wrap: wrap; gap: 1rem; padding: 0.9rem 1.1rem;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      font-size: 0.85rem; color: var(--muted);
    }
    .status-bar b { color: var(--fg); }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
    .dot.ok { background: var(--ok); } .dot.bad { background: var(--bad); } .dot.unknown { background: var(--muted); }
    table { width: 100%; border-collapse: collapse; background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    th, td { text-align: left; padding: 0.6rem 0.8rem; font-size: 0.88rem; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    tr:last-child td { border-bottom: none; }
    tr.event-row { cursor: pointer; }
    tr.event-row:hover { background: color-mix(in srgb, var(--accent) 8%, transparent); }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; }
    .badge.none { background: color-mix(in srgb, var(--muted) 25%, transparent); color: var(--muted); }
    .badge.heads_up_sent { background: color-mix(in srgb, var(--warn) 25%, transparent); color: var(--warn); }
    .badge.leave_now_sent { background: color-mix(in srgb, var(--accent) 25%, transparent); color: var(--accent); }
    .badge.running_late_sent { background: color-mix(in srgb, var(--bad) 25%, transparent); color: var(--bad); }
    .badge.done, .badge.cancelled, .badge.dropped { background: color-mix(in srgb, var(--muted) 20%, transparent); color: var(--muted); }
    .empty { padding: 1rem; color: var(--muted); font-style: italic; font-size: 0.88rem; }
    .history-row td { background: color-mix(in srgb, var(--fg) 3%, var(--card)); }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <h1>when2leave</h1>
  <p style="color: var(--muted); margin-top: 0;">Real-time travel-time tracking for your calendar.</p>

  <div id="sections" hx-get="/partials/sections" hx-trigger="every 15s" hx-swap="innerHTML">
    {% include "_sections.html" %}
  </div>
</body>
</html>
